 <!DOCTYPE html>
<html>
<head>
<title>GK Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  padding: 10px;
  background: #111;
  font-family: Arial, sans-serif;
  color: white;
}

.quiz-container {
  max-width: 280px;
  margin: 30px auto;
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
}

h1 {
  font-size: 18px;
  text-align: center;
}

#question {
  font-size: 14px;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 7px;
  margin: 5px 0;
  border: none;
  border-radius: 6px;
  background: crimson;
  color: white;
  font-size: 13px;
}

#score {
  font-size: 13px;
  margin-top: 8px;
  text-align: center;
}
</style>
</head>

<body>

<div class="quiz-container">
  <h1>GK Quiz</h1>
  <div id="question"></div>
  <div id="answers"></div>
  <div id="score"></div>
</div>

<script>
const quizData = [
{q:"What is the capital of India?", a:["Mumbai","Delhi","Kolkata","Chennai"], c:1},
{q:"Who invented the telephone?", a:["Edison","Newton","Alexander Graham Bell","Tesla"], c:2},
{q:"Largest planet?", a:["Earth","Mars","Jupiter","Saturn"], c:2},
{q:"Fastest land animal?", a:["Tiger","Cheetah","Lion","Leopard"], c:1},
{q:"Currency of Japan?", a:["Yuan","Won","Yen","Ringgit"], c:2},
{q:"Who discovered gravity?", a:["Einstein","Newton","Galileo","Tesla"], c:1},
{q:"Smallest continent?", a:["Asia","Europe","Australia","Africa"], c:2},
{q:"Which gas do plants absorb?", a:["Oxygen","Nitrogen","Carbon Dioxide","Helium"], c:2},
{q:"Largest ocean?", a:["Indian","Pacific","Atlantic","Arctic"], c:1},
{q:"Who wrote Hamlet?", a:["Shakespeare","Dickens","Tagore","Milton"], c:0},
{q:"National sport of Japan?", a:["Cricket","Sumo","Football","Baseball"], c:1},
{q:"H2O is?", a:["Oxygen","Hydrogen","Water","Salt"], c:2},
{q:"How many continents?", a:["5","6","7","8"], c:2},
{q:"Tallest mountain?", a:["K2","Everest","Kanchenjunga","Makalu"], c:1},
{q:"First man on moon?", a:["Yuri Gagarin","Neil Armstrong","Buzz Aldrin","Rakesh Sharma"], c:1}
];
let shuffled = quizData.sort(() => Math.random() - 0.5);
let current = 0;
let score = 0;
let timer;
let timeLeft = 15;

function startTimer() {
  timeLeft = 15;
  updateDisplay();

  timer = setInterval(() => {
    timeLeft--;
    updateDisplay();

    if (timeLeft <= 0) {
      cle
      nextQuestion();
    }
  }, 1000);
}

function updateDisplay() {
  document.getElementById("score").innerText =
    "Time: " + timeLeft + "s | Score: " + score;
}

function loadQuestion() {
  clearInterval(timer);

  if (current >= shuffled.length) {
    document.getElementById("question").innerText = "Quiz Finished!";
    document.getElementById("answers").innerHTML = "";
    document.getElementById("score").innerText =
      "Final Score: " + score + "/" + shuffled.length;
    return;
  }

  let q = shuffled[current];
  document.getElementById("question").innerText = q.q;

  let answersHTML = "";
  q.a.forEach((option, index) => {
    answersHTML += `<button onclick="checkAnswer(${index})">${option}</button>`;
  });

  document.getElementById("answers").innerHTML = answersHTML;

  startTimer();
}

function checkAnswer(index) {
  clearInterval(timer);
  if (index === shuffled[current].c) score++;
  nextQuestion();
}

function nextQuestion() {
  current++;
  loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
